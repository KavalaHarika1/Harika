name: Deploy Content to law-sentinel2 [b1b75501-f3e4-4952-8c05-85490896dddf]
# Note: This workflow will deploy everything in the root directory.
# To deploy content only from a specific path (for example SentinelContent):
#   1. Add the target path to the "paths" property like such
#    paths:
#    - 'SentinelContent/**'
#    - '!.github/workflows/**'
#    - '.github/workflows/sentinel-deploy-b1b75501-f3e4-4952-8c05-85490896dddf.yml'
#   2. Append the path to the directory environment variable below
#       directory: '${{ github.workspace }}/SentinelContent'

on:
  push:
    branches: [ main-sentinel-deployment ]
    paths:
    - '**'
    - '!.github/workflows/**'  # this filter prevents other workflow changes from triggering this workflow
    - '.github/workflows/sentinel-deploy-b1b75501-f3e4-4952-8c05-85490896dddf.yml'

jobs:
  deploy-content:
    runs-on: windows-latest
    env:
      resourceGroupName: 'worksspace'
      workspaceName: 'law-sentinel2'
      workspaceId: '2dc6798e-7bf3-49de-9fa7-5151504da0b2'
      directory: '${{ github.workspace }}'
      cloudEnv: 'AzureCloud'
      contentTypes: 'AnalyticsRule,AutomationRule,HuntingQuery,Parser,Playbook,Watchlist,Workbook'
      branch: 'main-sentinel-deployment'
      sourceControlId: 'b1b75501-f3e4-4952-8c05-85490896dddf'
      rootDirectory: '${{ github.workspace }}'
      githubAuthToken: ${{ secrets.GITHUB_TOKEN }}
      smartDeployment: 'true'
    permissions:
      contents: write
      id-token: write # Require write permission to Fetch an OIDC token.

    steps:
    - name: Login to Azure (Attempt 1)
      continue-on-error: true
      id: login1
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_b1b75501f3e449528c0585490896dddf }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_b1b75501f3e449528c0585490896dddf }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_b1b75501f3e449528c0585490896dddf }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Wait 30 seconds if login attempt 1 failed
      if: ${{ steps.login1.outcome=='failure' }}
      run: powershell Start-Sleep -s 30

    - name: Login to Azure (Attempt 2)
      continue-on-error: true
      id: login2
      uses: azure/login@v2
      if: ${{ steps.login1.outcome=='failure' }}
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_b1b75501f3e449528c0585490896dddf }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_b1b75501f3e449528c0585490896dddf }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_b1b75501f3e449528c0585490896dddf }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Wait 30 seconds if login attempt 2 failed
      if: ${{ steps.login2.outcome=='failure' }}
      run: powershell Start-Sleep -s 30

    - name: Login to Azure (Attempt 3)
      continue-on-error: false
      id: login3
      uses: azure/login@v2
      if: ${{ steps.login2.outcome=='failure'  }}
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_b1b75501f3e449528c0585490896dddf }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_b1b75501f3e449528c0585490896dddf }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_b1b75501f3e449528c0585490896dddf }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Checkout
      uses: actions/checkout@v3

    - name: Deploy Content to Microsoft Sentinel
      uses: azure/powershell@v2
      with:
        azPSVersion: 'latest'
        inlineScript: |
          ${{ github.workspace }}//.github/workflows/azure-sentinel-deploy-b1b75501-f3e4-4952-8c05-85490896dddf.ps1